services:
  - type: web
    name: ghostshift-backend
    env: python
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: OLLAMA_HOST
        sync: false
      - key: OLLAMA_MODEL
        sync: false
      - key: OLLAMA_MOCK
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
